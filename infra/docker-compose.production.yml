services:
  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile.server
    env_file:
      - ../.env
    ports:
      - "3001:3001"
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile.admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - server
