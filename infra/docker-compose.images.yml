services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yanqing_binpeng}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - yanqing_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  server:
    image: ${DOCKERHUB_NAMESPACE:-youhebukeer}/yanqing-binpeng-server:${IMAGE_TAG:-latest}
    env_file:
      - ../.env.deploy
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

  admin:
    image: ${DOCKERHUB_NAMESPACE:-youhebukeer}/yanqing-binpeng-admin:${IMAGE_TAG:-latest}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - server

volumes:
  yanqing_mysql_data:
